<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login FPS Booster</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="auth-box">

<h1>FPS BOOSTER PRO</h1>

<h2>Entrar</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Senha">

<button onclick="login()">
Entrar
</button>

<p>
<a href="forgot-password.html">
Esqueci minha senha
</a>
</p>

<p>

Não possui conta?

<a href="register.html">
Cadastrar
</a>

</p>

</div>

<script>

async function login(){

    const email =
    document.getElementById(
        "email"
    ).value;

    const password =
    document.getElementById(
        "password"
    ).value;

    const res =
    await fetch(

        "/auth/login",

        {

            method:"POST",

            headers:{

                "Content-Type":
                "application/json"

            },

            body:JSON.stringify({

                email,
                password

            })

        }

    );

    const data =
    await res.json();

    if(data.token){

        localStorage.setItem(
            "token",
            data.token
        );

        localStorage.setItem(
            "email",
            email
        );

        localStorage.setItem(
            "name",
            data.name
        );

        localStorage.setItem(
            "plan",
            data.plan
        );

        window.location.href =
        "dashboard.html";

    }
    else{

        alert(
            data.error ||
            "Erro no login"
        );

    }

}

</script>

</body>
</html>
