<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Recuperar Senha</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-box">

<h1>Recuperar Senha</h1>

<input
type="email"
id="email"
placeholder="Seu email">

<button onclick="recover()">
Enviar Link
</button>

<p id="msg"></p>

</div>

<script>

async function recover(){

    const email =
    document.getElementById(
        "email"
    ).value;

    console.log(email);

    const res =
    await fetch(
        "/auth/forgot-password",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                email
            })
        }
    );

    const data =
    await res.json();

    document.getElementById(
        "msg"
    ).innerText =
    data.message ||
    data.error;

}

</script>

</body>
</html>
